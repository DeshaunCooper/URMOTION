<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urmotion | Mobile Optimized</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #000000;
            --surface: #0A0A0A;
            --volt: #A8FF00;
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
            /* Adaptive padding: smaller on mobile, larger on desktop */
            --gutter: clamp(16px, 5vw, 60px); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--black); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; /* Prevents the "wobble" on mobile */
            width: 100%;
        }

        .container { 
            width: 100%; 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 0 var(--gutter); 
        }

        /* --- NAVIGATION FIX --- */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 20px var(--gutter); 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .header-greeting { font-size: clamp(18px, 4vw, 32px); font-weight: 700; }
        .header-logo { height: 20px; filter: invert(1); }

        /* --- HERO SECTION FIX --- */
        .hero { padding-top: 120px; margin-bottom: 60px; }
        .hero-banner { 
            height: 50vh; min-height: 350px; width: 100%; border-radius: 16px;
            display: flex; align-items: flex-end; padding: clamp(20px, 5vw, 60px);
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent), 
                        url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            border: 1px solid var(--border);
        }
        .hero h2 { font-size: clamp(28px, 6vw, 64px); font-weight: 900; line-height: 1; margin: 10px 0; letter-spacing: -1px; }

        /* --- HORIZONTAL SCROLL FIX --- */
        .track-section { margin-bottom: 60px; }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .content-scroll { 
            display: flex; gap: 16px; overflow-x: auto; 
            padding-bottom: 10px;
            margin-right: calc(var(--gutter) * -1); /* Bleeds the scroll to the edge of the screen */
            padding-right: var(--gutter);
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .content-scroll::-webkit-scrollbar { display: none; }

        .tile { 
            min-width: 160px; /* Base size for mobile */
            flex: 0 0 auto;
            height: 220px; background: var(--surface); border-radius: 12px; 
            border: 1px solid var(--border); overflow: hidden;
            position: relative;
            scroll-snap-align: start;
        }

        /* --- U+ PREMIUM SECTION --- */
        .u-plus-feature { 
            background: #050505; border-radius: 16px; 
            padding: clamp(24px, 5vw, 60px); 
            border: 1px solid rgba(168, 255, 0, 0.2);
            margin-bottom: 60px;
        }

        /* --- PROGRESS STRIP --- */
        .progress-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 60px;
        }
        .strip-item { background: var(--black); padding: 20px; text-align: center; }
        .strip-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--volt); }

        footer { padding: 80px var(--gutter); text-align: center; border-top: 1px solid var(--border); }
        .footer-logo { height: 40px; margin-bottom: 20px; opacity: 0.5; filter: invert(1); }

        /* Tablet/Desktop Tweaks */
        @media (min-width: 768px) {
            .tile { min-width: 220px; height: 300px; }
            .hero-banner { height: 60vh; }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <span style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--volt);">LIVE // 2026</span>
            <div class="header-greeting">Morning, Shaun</div>
        </div>
        <img src="https://i.ibb.co/L6vj7hX/Urmotion-Logo-1.png" alt="URMOTION" class="header-logo">
    </header>

    <main class="container">
        
        <section class="hero">
            <div class="hero-banner">
                <div style="z-index: 2;">
                    <h2 style="color: white;">Velocity Reset.</h2>
                    <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;">Hit 100k steps. Earn $25.00.</p>
                    <a href="#" style="background: var(--volt); color: black; padding: 12px 24px; text-decoration: none; font-weight: 700; border-radius: 4px; font-size: 13px;">JOIN CHALLENGE</a>
                </div>
            </div>
        </section>

        <section class="track-section">
            <div class="row-header">
                <h3 style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim);">Earning Now</h3>
                <a href="#" style="color: var(--volt); text-decoration: none; font-size: 12px; font-weight: 700;">View All</a>
            </div>
            <div class="content-scroll">
                <div class="tile"><div style="position:absolute; bottom:15px; left:15px; font-weight:700;">Power Sprint</div></div>
                <div class="tile"><div style="position:absolute; bottom:15px; left:15px; font-weight:700;">Yoga Flow</div></div>
                <div class="tile"><div style="position:absolute; bottom:15px; left:15px; font-weight:700;">Core Blast</div></div>
                <div class="tile"><div style="position:absolute; bottom:15px; left:15px; font-weight:700;">Evening Walk</div></div>
            </div>
        </section>

        <section class="u-plus-feature">
            <span style="font-family: 'JetBrains Mono'; color: var(--volt); font-size: 10px;">PREMIUM</span>
            <h2 style="font-size: 28px; margin: 10px 0;">The U+ Masterclass</h2>
            <p style="color: var(--text-dim); font-size: 14px;">Cinematic coaching. Higher rewards.</p>
        </section>

        <div class="progress-strip">
            <div class="strip-item">
                <div class="strip-val">$142.80</div>
                <div style="font-size: 10px; color: var(--text-dim);">EST. MONTHLY</div>
            </div>
            <div class="strip-item">
                <div class="strip-val">12,402</div>
                <div style="font-size: 10px; color: var(--text-dim);">TODAY'S STEPS</div>
            </div>
        </div>

    </main>

    <footer>
        <img src="https://i.ibb.co/L6vj7hX/Urmotion-Logo-1.png" alt="URMOTION" class="footer-logo">
        <p style="font-size: 10px; color: var(--text-dim); letter-spacing: 2px;">© 2026 URMOTION SYSTEMS</p>
    </footer>

</body>
</html>
